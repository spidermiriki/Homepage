<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <!-- Feuille du bas (plus inclinée) -->
  <g transform="rotate(-12, 80, 90)">
    <rect x="25" y="45" width="90" height="115" rx="3" fill="#e8e0d0" stroke="#bbb" stroke-width="1.5"/>
    <line x1="40" y1="70" x2="100" y2="70" stroke="#ccc" stroke-width="1.5"/>
    <line x1="40" y1="82" x2="100" y2="82" stroke="#ccc" stroke-width="1.5"/>
    <line x1="40" y1="94" x2="80" y2="94" stroke="#ccc" stroke-width="1.5"/>
  </g>
  <!-- Feuille du milieu -->
  <g transform="rotate(6, 80, 90)">
    <rect x="22" y="42" width="90" height="115" rx="3" fill="#f0ebe0" stroke="#bbb" stroke-width="1.5"/>
    <line x1="38" y1="67" x2="98" y2="67" stroke="#ccc" stroke-width="1.5"/>
    <line x1="38" y1="79" x2="98" y2="79" stroke="#ccc" stroke-width="1.5"/>
    <line x1="38" y1="91" x2="75" y2="91" stroke="#ccc" stroke-width="1.5"/>
  </g>
  <!-- Feuille du dessus -->
  <g transform="rotate(-3, 80, 90)">
    <rect x="20" y="40" width="90" height="115" rx="3" fill="#faf8f2" stroke="#aaa" stroke-width="1.5"/>
    <line x1="36" y1="65" x2="96" y2="65" stroke="#bbb" stroke-width="1.5"/>
    <line x1="36" y1="77" x2="96" y2="77" stroke="#bbb" stroke-width="1.5"/>
    <line x1="36" y1="89" x2="96" y2="89" stroke="#bbb" stroke-width="1.5"/>
    <line x1="36" y1="101" x2="70" y2="101" stroke="#bbb" stroke-width="1.5"/>
    <!-- Petit titre simulé -->
    <rect x="36" y="52" width="50" height="7" rx="2" fill="#999" opacity="0.4"/>
  </g>
</svg>
